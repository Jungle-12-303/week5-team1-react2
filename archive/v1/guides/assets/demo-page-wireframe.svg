<svg width="1600" height="1160" viewBox="0 0 1600 1160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1460" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4EE"/>
      <stop offset="1" stop-color="#EDEBE6"/>
    </linearGradient>
    <linearGradient id="header" x1="120" y1="80" x2="1480" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17313B"/>
      <stop offset="1" stop-color="#274854"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="1160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#18222A" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 30px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; fill: #F7F6F1; }
      .subtitle { font: 500 15px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; fill: #C6D2D7; }
      .card-title { font: 700 18px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; fill: #17313B; }
      .section-title { font: 700 20px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; fill: #17313B; }
      .meta { font: 600 13px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; fill: #5E6A70; }
      .body { font: 500 13px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; fill: #66737A; }
      .mono { font: 600 12px 'Consolas', 'Courier New', monospace; fill: #44525A; }
      .chip { font: 700 12px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; }
      .button { font: 700 14px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="1160" fill="url(#bg)"/>
  <rect x="56" y="48" width="1488" height="1064" rx="36" fill="#F9F7F2" stroke="#E1DED6"/>

  <g filter="url(#shadow)">
    <rect x="96" y="80" width="1408" height="88" rx="24" fill="url(#header)"/>
  </g>
  <text x="128" y="120" class="title">Virtual DOM Engine Demo</text>
  <text x="128" y="145" class="subtitle">DOM -&gt; VDOM -&gt; Diff -&gt; Patch -&gt; History</text>

  <rect x="1144" y="102" width="88" height="32" rx="16" fill="#E3AD63"/>
  <text x="1188" y="123" text-anchor="middle" class="chip" fill="#3F2A13">AUTO</text>
  <rect x="1244" y="102" width="108" height="32" rx="16" fill="#D2E0E5"/>
  <text x="1298" y="123" text-anchor="middle" class="chip" fill="#17313B">Index 1 / 4</text>
  <rect x="1366" y="102" width="110" height="32" rx="16" fill="#BBD7C3"/>
  <text x="1421" y="123" text-anchor="middle" class="chip" fill="#1D4A32">Preview Ready</text>

  <rect x="96" y="188" width="1408" height="86" rx="24" fill="#FFFDF9" stroke="#E6E0D7"/>
  <text x="126" y="220" class="section-title">How This Demo Works</text>
  <text x="126" y="246" class="body">1. Edit the target HTML on the left. 2. Build a virtual tree and compare it. 3. Apply only the changed parts to the real DOM.</text>
  <text x="126" y="266" class="body">Even if you do not know React yet, you can follow the flow from input to diff to patch to history.</text>

  <rect x="96" y="292" width="1408" height="58" rx="22" fill="#FFFDF9" stroke="#E6E0D7"/>
  <rect x="124" y="306" width="150" height="30" rx="15" fill="#EBD8B2"/>
  <text x="199" y="325" text-anchor="middle" class="chip" fill="#6D5020">1 Edit Target</text>
  <rect x="294" y="306" width="156" height="30" rx="15" fill="#E6E8D1"/>
  <text x="372" y="325" text-anchor="middle" class="chip" fill="#59612E">2 Build VDOM</text>
  <rect x="470" y="306" width="142" height="30" rx="15" fill="#DDE8F3"/>
  <text x="541" y="325" text-anchor="middle" class="chip" fill="#2B4F74">3 Find Diff</text>
  <rect x="632" y="306" width="150" height="30" rx="15" fill="#DCEAD8"/>
  <text x="707" y="325" text-anchor="middle" class="chip" fill="#2E5A3D">4 Apply Patch</text>
  <rect x="802" y="306" width="164" height="30" rx="15" fill="#E7DED0"/>
  <text x="884" y="325" text-anchor="middle" class="chip" fill="#5E5140">5 Move History</text>

  <rect x="96" y="368" width="1408" height="72" rx="22" fill="#FFFDF9" stroke="#E6E0D7"/>
  <text x="126" y="410" class="meta">Scenario</text>
  <rect x="206" y="386" width="208" height="36" rx="18" fill="#F2EEE6" stroke="#DDD6CA"/>
  <text x="228" y="408" class="body">List Reorder</text>
  <text x="385" y="408" class="body">v</text>

  <text x="452" y="410" class="meta">Diff Mode</text>
  <rect x="550" y="386" width="68" height="36" rx="18" fill="#17313B"/>
  <text x="584" y="408" text-anchor="middle" class="button" fill="#F6F5F0">Auto</text>
  <rect x="626" y="386" width="72" height="36" rx="18" fill="#F2EEE6" stroke="#DDD6CA"/>
  <text x="662" y="408" text-anchor="middle" class="button" fill="#45535A">Index</text>
  <rect x="706" y="386" width="76" height="36" rx="18" fill="#F2EEE6" stroke="#DDD6CA"/>
  <text x="744" y="408" text-anchor="middle" class="button" fill="#45535A">Keyed</text>

  <rect x="862" y="382" width="108" height="44" rx="22" fill="#D98A39"/>
  <text x="916" y="409" text-anchor="middle" class="button" fill="#FFF8F1">Patch</text>
  <rect x="982" y="382" width="88" height="44" rx="22" fill="#ECE7DD"/>
  <text x="1026" y="409" text-anchor="middle" class="button" fill="#45535A">Undo</text>
  <rect x="1080" y="382" width="88" height="44" rx="22" fill="#ECE7DD"/>
  <text x="1124" y="409" text-anchor="middle" class="button" fill="#45535A">Redo</text>
  <rect x="1178" y="382" width="88" height="44" rx="22" fill="#F4DDD7"/>
  <text x="1222" y="409" text-anchor="middle" class="button" fill="#8A4337">Reset</text>
  <rect x="1290" y="382" width="140" height="44" rx="22" fill="#E8EFE8"/>
  <text x="1360" y="409" text-anchor="middle" class="button" fill="#294A35">Run Tests</text>

  <rect x="96" y="464" width="448" height="298" rx="28" fill="#FCFBF7" stroke="#E6E0D7"/>
  <rect x="112" y="480" width="416" height="44" rx="18" fill="#F1ECE4"/>
  <text x="134" y="508" class="card-title">HTML Editor</text>
  <rect x="420" y="488" width="90" height="28" rx="14" fill="#D9E2D7"/>
  <text x="465" y="506" text-anchor="middle" class="chip" fill="#31523A">Sanitized</text>
  <text x="128" y="544" class="body">Enter the target HTML you want to reach.</text>
  <rect x="128" y="556" width="384" height="158" rx="18" fill="#F6F2EB" stroke="#E0D9CE"/>
  <text x="150" y="586" class="mono">&lt;ul class="items"&gt;</text>
  <text x="150" y="614" class="mono">  &lt;li key="a"&gt;A&lt;/li&gt;</text>
  <text x="150" y="642" class="mono">  &lt;li key="c"&gt;C&lt;/li&gt;</text>
  <text x="150" y="670" class="mono">  &lt;li key="b"&gt;B&lt;/li&gt;</text>
  <text x="150" y="698" class="mono">&lt;/ul&gt;</text>
  <text x="128" y="740" class="body">This changes the target state first, not the real DOM.</text>

  <rect x="576" y="464" width="448" height="298" rx="28" fill="#FBF8F2" stroke="#E6E0D7"/>
  <rect x="592" y="480" width="416" height="44" rx="18" fill="#F5E7D4"/>
  <text x="614" y="508" class="card-title">Test Panel</text>
  <rect x="910" y="488" width="82" height="28" rx="14" fill="#F3D5A7"/>
  <text x="951" y="506" text-anchor="middle" class="chip" fill="#7C521D">Target</text>
  <text x="608" y="544" class="body">Preview of the state you want to apply next.</text>
  <rect x="608" y="556" width="384" height="158" rx="18" fill="#FFFDF8" stroke="#E8DFD1"/>
  <rect x="640" y="582" width="156" height="20" rx="10" fill="#E1B769" opacity="0.45"/>
  <rect x="640" y="620" width="112" height="20" rx="10" fill="#E1B769" opacity="0.45"/>
  <rect x="640" y="658" width="138" height="20" rx="10" fill="#E1B769" opacity="0.45"/>
  <rect x="640" y="696" width="94" height="20" rx="10" fill="#E1B769" opacity="0.45"/>
  <text x="608" y="740" class="body">It shows the goal state before diff and patch are executed.</text>

  <rect x="1056" y="464" width="448" height="298" rx="28" fill="#F7FBFB" stroke="#DDE7E8"/>
  <rect x="1072" y="480" width="416" height="44" rx="18" fill="#D9E7EA"/>
  <text x="1094" y="508" class="card-title">Actual Panel</text>
  <rect x="1394" y="488" width="76" height="28" rx="14" fill="#B8D5D5"/>
  <text x="1432" y="506" text-anchor="middle" class="chip" fill="#1D4A54">Live</text>
  <text x="1088" y="544" class="body">This is the real browser DOM after patch is applied.</text>
  <rect x="1088" y="556" width="384" height="158" rx="18" fill="#FFFFFF" stroke="#D9E6E7"/>
  <rect x="1120" y="582" width="156" height="20" rx="10" fill="#5E9FAF" opacity="0.26"/>
  <rect x="1120" y="620" width="112" height="20" rx="10" fill="#5E9FAF" opacity="0.26"/>
  <rect x="1120" y="658" width="138" height="20" rx="10" fill="#5E9FAF" opacity="0.26"/>
  <rect x="1120" y="696" width="94" height="20" rx="10" fill="#5E9FAF" opacity="0.26"/>
  <text x="1088" y="740" class="body">Only the changed parts should be updated here.</text>

  <rect x="96" y="790" width="688" height="176" rx="28" fill="#FCFBF8" stroke="#E6E0D7"/>
  <rect x="112" y="806" width="656" height="40" rx="16" fill="#E5EDF4"/>
  <text x="134" y="832" class="card-title">Diff Log</text>
  <text x="128" y="868" class="body">What changed between the previous tree and the new target tree.</text>
  <rect x="128" y="886" width="194" height="28" rx="14" fill="#DCE8F5"/>
  <text x="225" y="904" text-anchor="middle" class="chip" fill="#294D74">MOVE_CHILD</text>
  <text x="342" y="905" class="mono">path:[0]  from:2  to:1  key:c</text>
  <rect x="128" y="926" width="164" height="28" rx="14" fill="#DCE8F5"/>
  <text x="210" y="944" text-anchor="middle" class="chip" fill="#294D74">SET_PROP</text>
  <text x="312" y="945" class="mono">path:[0,1]  className = "active"</text>

  <rect x="816" y="790" width="688" height="176" rx="28" fill="#FBFCF8" stroke="#DDE7D7"/>
  <rect x="832" y="806" width="656" height="40" rx="16" fill="#E0ECDD"/>
  <text x="854" y="832" class="card-title">Patch Log</text>
  <text x="848" y="868" class="body">How the detected changes were applied to the real DOM.</text>
  <rect x="848" y="886" width="174" height="28" rx="14" fill="#DCEAD8"/>
  <text x="935" y="904" text-anchor="middle" class="chip" fill="#2D5A3C">APPLIED</text>
  <text x="1042" y="905" class="mono">MOVE_CHILD executed on actual DOM</text>
  <rect x="848" y="926" width="174" height="28" rx="14" fill="#DCEAD8"/>
  <text x="935" y="944" text-anchor="middle" class="chip" fill="#2D5A3C">APPLIED</text>
  <text x="1042" y="945" class="mono">SET_PROP reflected without full rerender</text>

  <rect x="96" y="994" width="528" height="124" rx="28" fill="#FCFBF8" stroke="#E6E0D7"/>
  <rect x="112" y="1010" width="496" height="40" rx="16" fill="#F0ECE4"/>
  <text x="134" y="1036" class="card-title">History Panel</text>
  <text x="128" y="1072" class="body">Move back and forth between saved UI states.</text>
  <rect x="136" y="1088" width="92" height="26" rx="13" fill="#E7DED0"/>
  <text x="182" y="1105" text-anchor="middle" class="chip" fill="#5E5140">0 Initial</text>
  <rect x="244" y="1088" width="102" height="26" rx="13" fill="#E3AD63"/>
  <text x="295" y="1105" text-anchor="middle" class="chip" fill="#3F2A13">1 Patched</text>
  <rect x="362" y="1088" width="112" height="26" rx="13" fill="#E7DED0"/>
  <text x="418" y="1105" text-anchor="middle" class="chip" fill="#5E5140">2 Reordered</text>
  <text x="498" y="1106" class="body">entries + currentIndex</text>

  <rect x="656" y="994" width="848" height="124" rx="28" fill="#F9FBFB" stroke="#DDE6E7"/>
  <rect x="672" y="1010" width="816" height="40" rx="16" fill="#E2ECEF"/>
  <text x="694" y="1036" class="card-title">VNode Viewer / Inspect</text>
  <text x="688" y="1072" class="body">Internal tree representation used before the real DOM is updated.</text>
  <text x="688" y="1096" class="mono">{ currentVNode, diffMode: "auto", patchCount: 2, history }</text>
</svg>
