<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Card Collection Showcase</title>
  <style>
    :root {
      --bg: #08111f;
      --bg-soft: #0f1c2f;
      --panel: rgba(11, 23, 42, 0.84);
      --panel-strong: rgba(14, 28, 53, 0.92);
      --panel-soft: rgba(25, 45, 77, 0.72);
      --text: #eef4ff;
      --muted: #93a7c7;
      --line: rgba(147, 167, 199, 0.18);
      --accent: #7c5cff;
      --accent-2: #38bdf8;
      --accent-3: #f59e0b;
      --success: #22c55e;
      --shadow: 0 26px 60px rgba(2, 8, 22, 0.45);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --glare-x: 50%;
      --glare-y: 50%;
      --glare-opacity: 0;
      --glare-rotation: 0deg;
      --surface-shift: 0%;
      --light-x: 50%;
      --light-y: 50%;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Pretendard", "Segoe UI", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(124, 92, 255, 0.22), transparent 28rem),
        radial-gradient(circle at 90% 0%, rgba(56, 189, 248, 0.18), transparent 26rem),
        radial-gradient(circle at 50% 100%, rgba(245, 158, 11, 0.12), transparent 26rem),
        linear-gradient(180deg, #09111d 0%, #08111f 40%, #050a14 100%);
    }

    #app {
      width: min(100%, 1220px);
      margin: 0 auto;
      padding: 28px 20px 108px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
    }

    select,
    option {
      color: #eff5ff;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .service-shell,
    .service-body,
    .page-stack,
    .dashboard-stack,
    .detail-side-panel {
      display: grid;
      gap: 18px;
    }

    .top-nav,
    .global-status-bar,
    .panel-card,
    .page-header-card,
    .summary-card,
    .detail-showcase,
    .card-tile {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .top-nav {
      position: sticky;
      top: 18px;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 22px;
      border-radius: var(--radius-xl);
    }

    .brand-block {
      display: grid;
      gap: 4px;
    }

    .brand-eyebrow,
    .page-kicker,
    .global-status-kicker {
      margin: 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brand-title,
    .page-title,
    .detail-card-name {
      margin: 0;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .brand-title {
      font-size: 24px;
    }

    .brand-page {
      color: #c9d8f3;
      font-size: 14px;
    }

    .nav-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav-button,
    .mobile-tab,
    .ghost-button,
    .secondary-button,
    .primary-button,
    .favorite-button,
    .related-card-button {
      border-radius: 999px;
      transition: transform 160ms ease, background-color 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .nav-button,
    .mobile-tab {
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.04);
      color: #d8e5fa;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .nav-button.is-active,
    .mobile-tab.is-active {
      background: linear-gradient(135deg, rgba(124, 92, 255, 0.92), rgba(56, 189, 248, 0.9));
      color: white;
      border-color: transparent;
    }

    .global-status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 18px;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(124, 92, 255, 0.18), rgba(56, 189, 248, 0.12)),
        rgba(11, 23, 42, 0.88);
    }

    .global-status-message {
      flex: 1;
      text-align: right;
      font-size: 14px;
      color: white;
    }

    .page-header-card {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      padding: 24px;
      border-radius: var(--radius-xl);
    }

    .page-header-copy {
      display: grid;
      gap: 8px;
      max-width: 760px;
    }

    .page-title {
      font-size: clamp(32px, 5vw, 54px);
    }

    .page-description {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .page-header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .panel-card,
    .summary-card {
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .panel-heading {
      display: grid;
      gap: 6px;
      margin-bottom: 16px;
    }

    .panel-heading h2,
    .panel-heading p,
    .summary-label,
    .summary-help,
    .empty-state,
    .activity-description,
    .detail-flavor,
    .field-label {
      margin: 0;
    }

    .panel-heading h2 {
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .panel-heading p,
    .summary-help,
    .empty-state,
    .activity-description,
    .detail-flavor,
    .field-label,
    .card-number,
    .card-rarity,
    .quick-routine-meta {
      color: var(--muted);
      line-height: 1.55;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .summary-card {
      display: grid;
      gap: 12px;
      min-height: 156px;
    }

    .summary-card-warm {
      background: linear-gradient(180deg, rgba(245, 158, 11, 0.18), rgba(11, 23, 42, 0.9));
    }

    .summary-card-success {
      background: linear-gradient(180deg, rgba(34, 197, 94, 0.18), rgba(11, 23, 42, 0.9));
    }

    .summary-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .summary-value {
      font-size: 34px;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .dashboard-two-column,
    .detail-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(320px, 0.92fr);
      gap: 18px;
    }

    .activity-callout {
      display: grid;
      gap: 8px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .activity-title {
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .insight-list,
    .detail-stat-list {
      display: grid;
      gap: 10px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .toolbar-grid,
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .settings-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .field,
    .checkbox-field {
      display: grid;
      gap: 8px;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 46px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(8, 17, 31, 0.92);
      color: #eef4ff;
      outline: none;
    }

    .field select option {
      background: #0d182a;
      color: #eef4ff;
    }

    .checkbox-field {
      grid-template-columns: auto 1fr;
      align-items: center;
      min-height: 46px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .card-tile,
    .detail-showcase {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      transition: transform 180ms ease, box-shadow 180ms ease;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .card-tile {
      padding: 14px;
    }

    .card-tile.is-selected {
      box-shadow: 0 0 0 1px rgba(124, 92, 255, 0.65), var(--shadow);
    }

    .card-visual-button {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 22px;
      padding: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.12), transparent 48%),
        linear-gradient(160deg, rgba(255, 255, 255, 0.12), rgba(10, 19, 35, 0.86));
      isolation: isolate;
    }

    .card-light-frame,
    .card-prism-layer,
    .card-glare-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .card-light-frame {
      z-index: 1;
      border-radius: inherit;
      background:
        linear-gradient(140deg, rgba(255, 255, 255, 0.18), transparent 24%, transparent 78%, rgba(255, 255, 255, 0.1)),
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.18), transparent 32%),
        radial-gradient(circle at 80% 80%, rgba(56, 189, 248, 0.16), transparent 34%);
      opacity: 0.92;
    }

    .card-prism-layer {
      z-index: 2;
      border-radius: inherit;
      background:
        linear-gradient(calc(135deg + var(--glare-rotation)), rgba(124, 92, 255, 0.24), rgba(56, 189, 248, 0.12) 34%, rgba(245, 158, 11, 0.18) 64%, rgba(255, 255, 255, 0.08) 100%),
        linear-gradient(180deg, rgba(7, 14, 29, 0.05), rgba(7, 14, 29, 0.42));
      mix-blend-mode: screen;
      opacity: 0.72;
      transform: translate3d(calc(var(--surface-shift) * 0.18), calc(var(--surface-shift) * -0.12), 0);
    }

    .card-image,
    .detail-card-image {
      aspect-ratio: 4 / 5;
      width: 100%;
      object-fit: contain;
      position: relative;
      z-index: 3;
    }

    .card-glare-layer {
      z-index: 4;
      background:
        radial-gradient(circle at var(--light-x) var(--light-y), rgba(255, 255, 255, calc(var(--glare-opacity) * 0.42)), transparent 20%),
        radial-gradient(circle at calc(var(--light-x) + 8%) calc(var(--light-y) - 10%), rgba(255, 255, 255, calc(var(--glare-opacity) * 0.18)), transparent 30%);
      mix-blend-mode: screen;
      opacity: 0.95;
    }

    .card-glare-layer.is-detail {
      background:
        radial-gradient(circle at var(--light-x) var(--light-y), rgba(255, 255, 255, calc(var(--glare-opacity) * 0.56)), transparent 24%),
        radial-gradient(circle at calc(var(--light-x) + 10%) calc(var(--light-y) - 12%), rgba(255, 255, 255, calc(var(--glare-opacity) * 0.24)), transparent 32%);
    }

    .card-light-frame.is-detail {
      background:
        linear-gradient(140deg, rgba(255, 255, 255, 0.22), transparent 28%, transparent 76%, rgba(255, 255, 255, 0.12)),
        radial-gradient(circle at 18% 14%, rgba(255, 255, 255, 0.24), transparent 30%),
        radial-gradient(circle at 76% 84%, rgba(56, 189, 248, 0.18), transparent 34%);
    }

    .card-prism-layer.is-detail {
      background:
        linear-gradient(calc(140deg + var(--glare-rotation)), rgba(124, 92, 255, 0.28), rgba(56, 189, 248, 0.14) 34%, rgba(245, 158, 11, 0.18) 66%, rgba(255, 255, 255, 0.1) 100%),
        linear-gradient(180deg, rgba(7, 14, 29, 0.02), rgba(7, 14, 29, 0.3));
    }

    .card-overlay,
    .detail-card-caption {
      position: relative;
      z-index: 5;
      display: grid;
      gap: 8px;
      padding: 16px;
    }

    .card-overlay {
      background: linear-gradient(180deg, transparent 0%, rgba(6, 12, 24, 0.26) 42%, rgba(6, 12, 24, 0.82) 100%);
    }

    .card-name {
      font-size: 24px;
      letter-spacing: -0.04em;
      color: #f5f9ff;
      text-shadow: 0 10px 18px rgba(0, 0, 0, 0.46);
    }

    .card-number {
      color: #dbe8fb;
    }

    .card-type-row,
    .related-card-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .type-chip {
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: white;
      background: rgba(255, 255, 255, 0.08);
    }

    .type-chip-electric { background: rgba(245, 158, 11, 0.25); }
    .type-chip-fire { background: rgba(239, 68, 68, 0.24); }
    .type-chip-ghost { background: rgba(139, 92, 246, 0.25); }
    .type-chip-water { background: rgba(59, 130, 246, 0.24); }
    .type-chip-fighting { background: rgba(234, 88, 12, 0.24); }
    .type-chip-psychic { background: rgba(236, 72, 153, 0.24); }

    .card-meta-row,
    .detail-button-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
    }

    .favorite-button,
    .related-card-button,
    .ghost-button,
    .secondary-button,
    .primary-button {
      padding: 11px 16px;
      font-weight: 700;
    }

    .favorite-button,
    .ghost-button {
      background: rgba(255, 255, 255, 0.05);
      color: #dbe7fb;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .favorite-button.is-active,
    .primary-button {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
    }

    .secondary-button {
      background: linear-gradient(135deg, rgba(124, 92, 255, 0.2), rgba(56, 189, 248, 0.18));
      color: white;
      border: 1px solid rgba(124, 92, 255, 0.28);
    }

    .detail-showcase {
      min-height: 620px;
      display: grid;
      align-content: end;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(124, 92, 255, 0.3), transparent 36%),
        radial-gradient(circle at bottom, rgba(56, 189, 248, 0.22), transparent 34%),
        linear-gradient(180deg, rgba(11, 23, 42, 0.92), rgba(6, 12, 24, 0.96));
    }

    .detail-card-image {
      padding: 22px;
    }

    .detail-card-caption {
      background: linear-gradient(180deg, transparent 0%, rgba(6, 12, 24, 0.12) 36%, rgba(6, 12, 24, 0.78) 100%);
    }

    .detail-card-name {
      font-size: 38px;
      color: #f8fbff;
      text-shadow: 0 12px 20px rgba(0, 0, 0, 0.42);
    }

    .detail-card-number {
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .detail-flavor {
      font-size: 15px;
    }

    .empty-detail-card {
      min-height: 240px;
      place-items: center;
      text-align: center;
    }

    .mobile-tabbar {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 20;
      width: min(calc(100% - 20px), 560px);
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      background: rgba(5, 10, 20, 0.88);
      box-shadow: 0 22px 36px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(18px);
    }

    .mobile-tab-label {
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 980px) {
      .dashboard-grid,
      .toolbar-grid,
      .settings-grid,
      .dashboard-two-column,
      .detail-layout {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .dashboard-two-column > *:first-child,
      .detail-layout > *:first-child {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      #app {
        padding: 18px 14px 110px;
      }

      .top-nav {
        display: none;
      }

      .mobile-tabbar {
        display: grid;
      }

      .global-status-bar,
      .page-header-card {
        align-items: flex-start;
        flex-direction: column;
      }

      .global-status-message {
        text-align: left;
      }

      .dashboard-grid,
      .toolbar-grid,
      .settings-grid,
      .dashboard-two-column,
      .detail-layout {
        grid-template-columns: 1fr;
      }

      .card-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-showcase {
        min-height: 460px;
      }
    }

    @media (max-width: 520px) {
      .card-grid {
        grid-template-columns: 1fr;
      }

      .detail-card-name {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/app/main.js"></script>
</body>
</html>
