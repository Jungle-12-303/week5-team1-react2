<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Card Collection Showcase</title>
  <style>
    :root {
      --bg: #08111f;
      --bg-soft: #0f1c2f;
      --panel: rgba(11, 23, 42, 0.84);
      --panel-strong: rgba(14, 28, 53, 0.92);
      --panel-soft: rgba(25, 45, 77, 0.72);
      --text: #eef4ff;
      --muted: #93a7c7;
      --line: rgba(147, 167, 199, 0.18);
      --accent: #7c5cff;
      --accent-2: #38bdf8;
      --accent-3: #f59e0b;
      --success: #22c55e;
      --shadow: 0 26px 60px rgba(2, 8, 22, 0.45);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --glare-opacity: 0;
      --glare-strength: 0.42;
      --glare-rotation: 0deg;
      --surface-shift: 0%;
      --shine-shift-x: 0%;
      --shine-shift-y: 0%;
      --wave-skew: 0deg;
      --holo-x: 50%;
      --holo-y: 50%;
      --sparkle-opacity: 0.18;
      --edge-glow-opacity: 0.18;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Pretendard", "Segoe UI", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(124, 92, 255, 0.22), transparent 28rem),
        radial-gradient(circle at 90% 0%, rgba(56, 189, 248, 0.18), transparent 26rem),
        radial-gradient(circle at 50% 100%, rgba(245, 158, 11, 0.12), transparent 26rem),
        linear-gradient(180deg, #09111d 0%, #08111f 40%, #050a14 100%);
    }

    #app {
      width: min(100%, 1220px);
      margin: 0 auto;
      padding: 28px 20px 108px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
    }

    select,
    option {
      color: #eff5ff;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .service-shell,
    .service-body,
    .page-stack,
    .dashboard-stack,
    .detail-showcase-stack,
    .detail-side-panel {
      display: grid;
      gap: 18px;
    }

    .top-nav,
    .global-status-bar,
    .runtime-notice-bar,
    .panel-card,
    .page-header-card,
    .summary-card,
    .detail-showcase,
    .card-tile {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .top-nav {
      position: sticky;
      top: 18px;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 22px;
      border-radius: var(--radius-xl);
    }

    .brand-block {
      display: grid;
      gap: 4px;
    }

    .brand-eyebrow,
    .page-kicker,
    .global-status-kicker {
      margin: 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brand-title,
    .page-title,
    .detail-card-name {
      margin: 0;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .brand-title {
      font-size: 24px;
    }

    .brand-page {
      color: #c9d8f3;
      font-size: 14px;
    }

    .nav-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav-button,
    .mobile-tab,
    .ghost-button,
    .secondary-button,
    .primary-button,
    .favorite-button,
    .related-card-button {
      border-radius: 999px;
      transition: transform 160ms ease, background-color 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .nav-button,
    .mobile-tab {
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.04);
      color: #d8e5fa;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .nav-button.is-active,
    .mobile-tab.is-active {
      background: linear-gradient(135deg, rgba(124, 92, 255, 0.92), rgba(56, 189, 248, 0.9));
      color: white;
      border-color: transparent;
    }

    .global-status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 18px;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(124, 92, 255, 0.18), rgba(56, 189, 248, 0.12)),
        rgba(11, 23, 42, 0.88);
    }

    .runtime-notice-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 18px;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(245, 158, 11, 0.16), rgba(248, 113, 113, 0.08)),
        rgba(22, 16, 8, 0.92);
    }

    .global-status-message {
      flex: 1;
      text-align: right;
      font-size: 14px;
      color: white;
    }

    .runtime-notice-label {
      margin: 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fcd34d;
    }

    .runtime-notice-message {
      flex: 1;
      margin: 0;
      text-align: right;
      font-size: 14px;
      color: #fff7ed;
    }

    .page-header-card {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      padding: 24px;
      border-radius: var(--radius-xl);
    }

    .page-header-copy {
      display: grid;
      gap: 8px;
      max-width: 760px;
    }

    .page-title {
      font-size: clamp(32px, 5vw, 54px);
    }

    .page-description {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .page-header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .panel-card,
    .summary-card {
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .panel-heading {
      display: grid;
      gap: 6px;
      margin-bottom: 16px;
    }

    .panel-heading h2,
    .panel-heading p,
    .summary-label,
    .summary-help,
    .empty-state,
    .activity-description,
    .detail-flavor,
    .field-label {
      margin: 0;
    }

    .panel-heading h2 {
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .panel-heading p,
    .summary-help,
    .empty-state,
    .activity-description,
    .detail-flavor,
    .field-label,
    .card-number,
    .card-rarity,
    .quick-routine-meta {
      color: var(--muted);
      line-height: 1.55;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .service-body {
      grid-template-columns: minmax(0, 1fr) 320px;
      align-items: start;
    }

    .service-body.is-collection-page {
      grid-template-columns: minmax(0, 1fr) 272px;
      gap: 16px;
    }

    .service-main {
      min-width: 0;
    }

    .runtime-inspector {
      position: sticky;
      top: 24px;
      max-height: calc(100vh - 48px);
      overflow: auto;
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(124, 92, 255, 0.08), rgba(11, 23, 42, 0.94)),
        rgba(11, 23, 42, 0.94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .runtime-inspector.is-collection-inspector {
      padding: 16px;
      gap: 12px;
    }

    .inspector-stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .inspector-stat-card,
    .inspector-note-card,
    .inspector-patch-card,
    .inspector-probe-card {
      display: grid;
      gap: 8px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.04);
    }

    .inspector-stat-label,
    .inspector-note-label,
    .inspector-probe-caption {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .inspector-stat-value,
    .inspector-note-value,
    .inspector-probe-title {
      font-size: 22px;
      letter-spacing: -0.04em;
      color: #f6f9ff;
    }

    .inspector-note-value,
    .inspector-probe-title {
      font-size: 16px;
      line-height: 1.4;
    }

    .inspector-note-meta {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .inspector-patch-list {
      display: grid;
      gap: 8px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .inspector-patch-row {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      color: #eff6ff;
      font-size: 13px;
      font-weight: 600;
    }

    .inspector-patch-row.is-empty {
      color: var(--muted);
      font-weight: 500;
    }

    .inspector-probe-card {
      overflow: hidden;
    }

    .inspector-probe-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      border-radius: 16px;
      background:
        radial-gradient(circle at top, rgba(124, 92, 255, 0.2), transparent 40%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(5, 10, 20, 0.82));
      padding: 12px;
    }

    .inspector-probe-copy {
      display: grid;
      gap: 6px;
    }

    .is-patch-highlighted,
    [data-patch-highlighted="true"] {
      outline: 2px solid rgba(191, 219, 254, 0.92);
      outline-offset: 2px;
      animation: patchPulse 980ms ease 2;
      box-shadow:
        0 0 0 1px rgba(191, 219, 254, 0.82),
        0 0 0 7px rgba(56, 189, 248, 0.14),
        0 0 48px rgba(124, 92, 255, 0.28),
        0 0 18px rgba(56, 189, 248, 0.18),
        var(--shadow);
      filter: saturate(1.08) brightness(1.03);
    }

    @keyframes patchPulse {
      0% {
        outline-color: rgba(191, 219, 254, 0);
        outline-offset: 0;
        box-shadow:
          0 0 0 0 rgba(191, 219, 254, 0),
          0 0 0 0 rgba(56, 189, 248, 0),
          var(--shadow);
      }

      35% {
        outline-color: rgba(191, 219, 254, 0.98);
        outline-offset: 3px;
        box-shadow:
          0 0 0 2px rgba(191, 219, 254, 0.9),
          0 0 0 9px rgba(56, 189, 248, 0.18),
          0 0 58px rgba(124, 92, 255, 0.34),
          0 0 22px rgba(56, 189, 248, 0.22),
          var(--shadow);
      }

      100% {
        outline-color: rgba(191, 219, 254, 0.12);
        outline-offset: 1px;
        box-shadow:
          0 0 0 1px rgba(191, 219, 254, 0.22),
          0 0 0 0 rgba(56, 189, 248, 0),
          0 0 18px rgba(124, 92, 255, 0.12),
          var(--shadow);
      }
    }

    .summary-card {
      display: grid;
      gap: 12px;
      min-height: 156px;
    }

    .summary-card-warm {
      background: linear-gradient(180deg, rgba(245, 158, 11, 0.18), rgba(11, 23, 42, 0.9));
    }

    .summary-card-success {
      background: linear-gradient(180deg, rgba(34, 197, 94, 0.18), rgba(11, 23, 42, 0.9));
    }

    .summary-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .summary-value {
      font-size: 34px;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .dashboard-two-column,
    .detail-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(320px, 0.92fr);
      gap: 18px;
    }

    .detail-showcase-stack {
      align-content: start;
    }

    .detail-kpi-stack {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .activity-callout {
      display: grid;
      gap: 8px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .activity-title {
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .insight-list,
    .detail-stat-list,
    .detail-base-stats-list {
      display: grid;
      gap: 10px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .toolbar-grid,
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .settings-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .field,
    .checkbox-field {
      display: grid;
      gap: 8px;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 46px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(8, 17, 31, 0.92);
      color: #eef4ff;
      outline: none;
    }

    .field select option {
      background: #0d182a;
      color: #eef4ff;
    }

    .checkbox-field {
      grid-template-columns: auto 1fr;
      align-items: center;
      min-height: 46px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .collection-scroll-area {
      height: clamp(620px, 78vh, 940px);
      overflow-y: auto;
      padding-right: 8px;
      scrollbar-gutter: stable;
    }

    .collection-virtual-canvas {
      position: relative;
      width: 100%;
      min-height: 100%;
    }

    .collection-virtual-window {
      position: absolute;
      inset: 0 0 auto 0;
      will-change: transform;
    }

    .collection-virtual-grid {
      grid-template-columns: repeat(var(--collection-columns, 3), minmax(0, 1fr));
      grid-auto-rows: var(--collection-row-height, 430px);
      align-content: start;
    }

    #page-collection .collection-virtual-grid .card-tile {
      height: var(--collection-row-height, 430px);
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      align-content: start;
    }

    #page-collection .collection-virtual-grid .card-visual-button {
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      align-content: stretch;
    }

    #page-collection .collection-virtual-grid .card-image {
      min-height: 0;
      height: 100%;
      aspect-ratio: auto;
      padding: 20px 16px 10px;
      align-self: end;
    }

    #page-collection .collection-virtual-grid .card-overlay {
      min-height: 108px;
    }

    #page-collection .collection-virtual-grid .card-meta-row {
      margin-top: 10px;
    }

    #page-collection .toolbar-card {
      padding: 16px 18px;
    }

    .card-tile,
    .detail-showcase {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      transition: transform 180ms ease, box-shadow 180ms ease;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .card-tile {
      padding: 14px;
    }

    .card-tile.is-selected {
      box-shadow: 0 0 0 1px rgba(124, 92, 255, 0.65), var(--shadow);
    }

    .card-visual-button {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 22px;
      padding: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.12), transparent 48%),
        linear-gradient(160deg, rgba(255, 255, 255, 0.12), rgba(10, 19, 35, 0.86));
      isolation: isolate;
    }

    .card-light-frame,
    .card-prism-layer,
    .card-sparkle-layer,
    .card-glare-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .card-light-frame {
      z-index: 1;
      border-radius: inherit;
      background:
        linear-gradient(140deg, rgba(255, 255, 255, 0.18), transparent 24%, transparent 78%, rgba(255, 255, 255, 0.1)),
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.18), transparent 32%),
        radial-gradient(circle at 80% 80%, rgba(56, 189, 248, 0.16), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, calc(var(--edge-glow-opacity) * 0.12)), transparent 28%, transparent 72%, rgba(124, 92, 255, calc(var(--edge-glow-opacity) * 0.16)));
      opacity: 0.92;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.05),
        inset 0 0 36px rgba(124, 92, 255, calc(var(--edge-glow-opacity) * 0.18));
    }

    .card-prism-layer {
      z-index: 2;
      border-radius: inherit;
      background:
        radial-gradient(circle at var(--holo-x) var(--holo-y), rgba(255, 255, 255, calc(var(--glare-strength) * 0.16)), transparent 26%),
        linear-gradient(calc(136deg + var(--glare-rotation)), rgba(255, 0, 128, calc(var(--glare-strength) * 0.14)), rgba(124, 92, 255, calc(var(--glare-strength) * 0.18)) 18%, rgba(56, 189, 248, calc(var(--glare-strength) * 0.14)) 36%, rgba(52, 211, 153, calc(var(--glare-strength) * 0.1)) 56%, rgba(250, 204, 21, calc(var(--glare-strength) * 0.14)) 76%, rgba(255, 255, 255, calc(var(--glare-strength) * 0.05)) 100%),
        linear-gradient(180deg, rgba(7, 14, 29, 0.05), rgba(7, 14, 29, 0.42));
      mix-blend-mode: screen;
      opacity: 0.84;
      transform: translate3d(calc(var(--surface-shift) * 0.18), calc(var(--surface-shift) * -0.12), 0);
    }

    .card-sparkle-layer {
      z-index: 3;
      border-radius: inherit;
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 255, 255, calc(var(--sparkle-opacity) * 0.9)), transparent 1.2%),
        radial-gradient(circle at 32% 68%, rgba(255, 255, 255, calc(var(--sparkle-opacity) * 0.65)), transparent 1%),
        radial-gradient(circle at 48% 36%, rgba(191, 219, 254, calc(var(--sparkle-opacity) * 0.8)), transparent 1.1%),
        radial-gradient(circle at 62% 58%, rgba(253, 224, 71, calc(var(--sparkle-opacity) * 0.75)), transparent 1.2%),
        radial-gradient(circle at 78% 24%, rgba(196, 181, 253, calc(var(--sparkle-opacity) * 0.85)), transparent 1%),
        radial-gradient(circle at 84% 72%, rgba(255, 255, 255, calc(var(--sparkle-opacity) * 0.7)), transparent 1.1%),
        radial-gradient(circle at 26% 44%, rgba(250, 204, 21, calc(var(--sparkle-opacity) * 0.62)), transparent 0.9%),
        radial-gradient(circle at 58% 18%, rgba(255, 255, 255, calc(var(--sparkle-opacity) * 0.76)), transparent 0.95%),
        radial-gradient(circle at 72% 46%, rgba(125, 211, 252, calc(var(--sparkle-opacity) * 0.64)), transparent 0.9%);
      mix-blend-mode: screen;
      opacity: 0.92;
      transform: translate3d(calc(var(--shine-shift-x) * 0.18), calc(var(--shine-shift-y) * -0.18), 0);
    }

    .card-image,
    .detail-card-image {
      aspect-ratio: 4 / 5;
      width: 100%;
      object-fit: contain;
      position: relative;
      z-index: 4;
    }

    .card-glare-layer {
      z-index: 5;
      inset: -34%;
      border-radius: inherit;
      background:
        radial-gradient(circle at var(--holo-x) var(--holo-y), rgba(255, 255, 255, calc(var(--glare-opacity) * 0.14 + 0.03)), transparent 20%),
        linear-gradient(
          calc(126deg + var(--glare-rotation)),
          transparent 36%,
          rgba(255, 255, 255, calc(var(--glare-opacity) * 0.03 + 0.01)) 44%,
          rgba(255, 255, 255, calc(var(--glare-opacity) * 0.34 + 0.04)) 49%,
          rgba(186, 230, 253, calc(var(--glare-opacity) * 0.16 + 0.03)) 53%,
          rgba(255, 255, 255, calc(var(--glare-opacity) * 0.03 + 0.01)) 58%,
          transparent 66%
        );
      mix-blend-mode: screen;
      opacity: 0.84;
      transform:
        translate3d(var(--shine-shift-x), var(--shine-shift-y), 0)
        skewX(var(--wave-skew));
      filter: blur(1.25px);
    }

    .card-glare-layer.is-detail {
      inset: -38%;
      border-radius: inherit;
      background:
        radial-gradient(circle at 20% 16%, rgba(255, 255, 255, calc(var(--glare-opacity) * 0.15 + 0.04)), transparent 24%),
        linear-gradient(
          calc(130deg + var(--glare-rotation)),
          transparent 36%,
          rgba(255, 255, 255, calc(var(--glare-opacity) * 0.04 + 0.02)) 44%,
          rgba(255, 255, 255, calc(var(--glare-opacity) * 0.3 + 0.04)) 49%,
          rgba(196, 181, 253, calc(var(--glare-opacity) * 0.14 + 0.03)) 53%,
          rgba(255, 255, 255, calc(var(--glare-opacity) * 0.04 + 0.02)) 58%,
          transparent 66%
        );
    }

    .card-light-frame.is-detail {
      background:
        linear-gradient(140deg, rgba(255, 255, 255, 0.22), transparent 28%, transparent 76%, rgba(255, 255, 255, 0.12)),
        radial-gradient(circle at 18% 14%, rgba(255, 255, 255, 0.24), transparent 30%),
        radial-gradient(circle at 76% 84%, rgba(56, 189, 248, 0.18), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, calc(var(--edge-glow-opacity) * 0.16)), transparent 26%, transparent 74%, rgba(124, 92, 255, calc(var(--edge-glow-opacity) * 0.22)));
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.06),
        inset 0 0 54px rgba(124, 92, 255, calc(var(--edge-glow-opacity) * 0.24));
    }

    .card-prism-layer.is-detail {
      background:
        radial-gradient(circle at var(--holo-x) var(--holo-y), rgba(255, 255, 255, calc(var(--glare-strength) * 0.2)), transparent 24%),
        linear-gradient(calc(142deg + var(--glare-rotation)), rgba(255, 0, 128, calc(var(--glare-strength) * 0.16)), rgba(124, 92, 255, calc(var(--glare-strength) * 0.2)) 18%, rgba(56, 189, 248, calc(var(--glare-strength) * 0.16)) 36%, rgba(52, 211, 153, calc(var(--glare-strength) * 0.12)) 56%, rgba(250, 204, 21, calc(var(--glare-strength) * 0.16)) 76%, rgba(255, 255, 255, calc(var(--glare-strength) * 0.08)) 100%),
        linear-gradient(180deg, rgba(7, 14, 29, 0.02), rgba(7, 14, 29, 0.3));
    }

    .card-sparkle-layer.is-detail {
      opacity: 1;
      transform: translate3d(calc(var(--shine-shift-x) * 0.24), calc(var(--shine-shift-y) * -0.22), 0) scale(1.06);
    }

    .card-overlay,
    .detail-card-caption {
      position: relative;
      z-index: 6;
      display: grid;
      gap: 8px;
      padding: 16px;
    }

    .card-overlay {
      background: linear-gradient(180deg, transparent 0%, rgba(6, 12, 24, 0.26) 42%, rgba(6, 12, 24, 0.82) 100%);
    }

    .card-name {
      font-size: 24px;
      letter-spacing: -0.04em;
      color: #f5f9ff;
      text-shadow: 0 10px 18px rgba(0, 0, 0, 0.46);
    }

    .card-number {
      color: #dbe8fb;
    }

    .card-type-row,
    .related-card-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .type-chip {
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: white;
      background: rgba(255, 255, 255, 0.08);
    }

    .type-chip-normal { background: rgba(168, 167, 122, 0.34); }
    .type-chip-fire { background: rgba(238, 129, 48, 0.34); }
    .type-chip-water { background: rgba(99, 144, 240, 0.34); }
    .type-chip-electric { background: rgba(247, 208, 44, 0.34); color: #1f2937; }
    .type-chip-grass { background: rgba(122, 199, 76, 0.34); }
    .type-chip-ice { background: rgba(150, 217, 214, 0.34); color: #12313d; }
    .type-chip-fighting { background: rgba(194, 46, 40, 0.34); }
    .type-chip-poison { background: rgba(163, 62, 161, 0.34); }
    .type-chip-ground { background: rgba(226, 191, 101, 0.34); color: #2b2110; }
    .type-chip-flying { background: rgba(169, 143, 243, 0.34); }
    .type-chip-psychic { background: rgba(249, 85, 135, 0.34); }
    .type-chip-bug { background: rgba(166, 185, 26, 0.34); color: #182212; }
    .type-chip-rock { background: rgba(182, 161, 54, 0.34); color: #211c0d; }
    .type-chip-ghost { background: rgba(115, 87, 151, 0.34); }
    .type-chip-dragon { background: rgba(111, 53, 252, 0.34); }
    .type-chip-dark { background: rgba(112, 87, 70, 0.34); }
    .type-chip-steel { background: rgba(183, 183, 206, 0.34); color: #1f2937; }
    .type-chip-fairy { background: rgba(214, 133, 173, 0.34); }

    .card-meta-row,
    .detail-button-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
    }

    .favorite-button,
    .related-card-button,
    .ghost-button,
    .secondary-button,
    .primary-button {
      padding: 11px 16px;
      font-weight: 700;
    }

    .favorite-button,
    .ghost-button {
      background: rgba(255, 255, 255, 0.05);
      color: #dbe7fb;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .favorite-button.is-active,
    .primary-button {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
    }

    .secondary-button {
      background: linear-gradient(135deg, rgba(124, 92, 255, 0.2), rgba(56, 189, 248, 0.18));
      color: white;
      border: 1px solid rgba(124, 92, 255, 0.28);
    }

    .detail-showcase {
      min-height: 0;
      max-height: 720px;
      display: grid;
      align-content: stretch;
      align-items: stretch;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(124, 92, 255, 0.3), transparent 36%),
        radial-gradient(circle at bottom, rgba(56, 189, 248, 0.22), transparent 34%),
        linear-gradient(180deg, rgba(11, 23, 42, 0.92), rgba(6, 12, 24, 0.96));
    }

    .detail-card-image {
      height: min(100%, 620px);
      min-height: 0;
      max-height: 620px;
      padding: 20px 18px 104px;
      object-position: center 58%;
      transform: none;
    }

    .detail-card-caption {
      position: absolute;
      inset: auto 0 0 0;
      background: linear-gradient(180deg, transparent 0%, rgba(6, 12, 24, 0.12) 36%, rgba(6, 12, 24, 0.78) 100%);
    }

    .sprite-preview-card {
      overflow: hidden;
    }

    .sprite-preview-shell {
      display: flex;
      justify-content: center;
    }

    .sprite-preview-card-frame {
      width: min(100%, 280px);
      display: grid;
      gap: 12px;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(7, 14, 29, 0.88)),
        rgba(7, 14, 29, 0.88);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .detail-sprite-image {
      width: 100%;
      max-width: 180px;
      margin: 0 auto;
      image-rendering: pixelated;
      filter: drop-shadow(0 16px 22px rgba(0, 0, 0, 0.35));
    }

    .sprite-preview-caption {
      display: grid;
      gap: 4px;
      text-align: center;
    }

    .sprite-preview-title {
      font-size: 18px;
      letter-spacing: -0.03em;
      color: #f5f9ff;
    }

    .sprite-preview-meta {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .detail-card-name {
      font-size: 38px;
      color: #f8fbff;
      text-shadow: 0 12px 20px rgba(0, 0, 0, 0.42);
    }

    .detail-card-number {
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .detail-flavor {
      font-size: 15px;
    }

    .detail-base-stats-block {
      display: grid;
      gap: 12px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .detail-subtitle {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .detail-stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
    }

    .detail-stat-name {
      color: var(--muted);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .detail-stat-value {
      font-size: 18px;
      letter-spacing: -0.03em;
      color: #f5f9ff;
    }

    .empty-detail-card {
      min-height: 240px;
      place-items: center;
      text-align: center;
    }

    .mobile-tabbar {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 20;
      width: min(calc(100% - 20px), 560px);
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      background: rgba(5, 10, 20, 0.88);
      box-shadow: 0 22px 36px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(18px);
    }

    .mobile-tab-label {
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 980px) {
      .dashboard-grid,
      .toolbar-grid,
      .settings-grid,
      .dashboard-two-column,
      .detail-layout {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .service-body {
        grid-template-columns: 1fr;
      }

      .service-body.is-collection-page {
        grid-template-columns: 1fr;
      }

      .runtime-inspector {
        position: static;
        order: -1;
      }

      .dashboard-two-column > *:first-child,
      .detail-layout > *:first-child {
        grid-column: 1 / -1;
      }

    }

    @media (max-width: 760px) {
      #app {
        padding: 18px 14px 110px;
      }

      .runtime-inspector {
        display: none;
      }

      .top-nav {
        display: none;
      }

      .mobile-tabbar {
        display: grid;
      }

      .global-status-bar,
      .runtime-notice-bar,
      .page-header-card {
        align-items: flex-start;
        flex-direction: column;
      }

      .global-status-message {
        text-align: left;
      }

      .runtime-notice-message {
        text-align: left;
      }

      .dashboard-grid,
      .toolbar-grid,
      .settings-grid,
      .dashboard-two-column,
      .detail-layout {
        grid-template-columns: 1fr;
      }

      .detail-kpi-stack {
        grid-template-columns: 1fr;
      }

      .card-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-showcase {
        max-height: none;
        min-height: 460px;
      }

      .detail-card-image {
        height: auto;
        max-height: 460px;
        padding-bottom: 92px;
      }
    }

    @media (max-width: 520px) {
      .card-grid {
        grid-template-columns: 1fr;
      }

      .detail-card-name {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/app/main.js"></script>
</body>
</html>
